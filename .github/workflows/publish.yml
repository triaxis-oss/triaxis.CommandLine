name: publish nuget
on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

defaults:
  run:
    working-directory: src

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_NOLOGO: true
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      # Install mono on Linux if it isn't already available - needed to run the net48 test executables
      - if: runner.os == 'Linux'
        name: Ensure mono is installed
        run: |
          if ! command -v mono >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends mono-runtime
          fi
          mono --version
      - run: dotnet test -c Release
      - if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.os }}
          path: src/**/TestResults/*.log
          if-no-files-found: ignore
      - run: dotnet build -c Release ../examples/Examples.sln

  publish:
    name: Publish nuget
    needs: test
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: true
      PUBLISH: ${{startsWith(github.ref, 'refs/tags/v')}}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # v2.0.0-3-gabcdef -> 2.0.0-dev.3+gabcdef
            # v2.0.0-alpha.1-3-gabcdef -> 2.0.0-alpha.1.dev.3+gabcdef
            # abcdef (no tags) -> 0.0.0-dev.0+gabcdef
            git describe --tags --match 'v*' --long --always \
              | perl -pe 's/^v([\d.]+)(-[^0-9].*?)?-(\d+)-g(.+)$/"version=$1$2".($2?".":"-")."dev.$3+g$4"/e || s/^(.+)$/version=0.0.0-dev.0+g$1/' \
              >> "$GITHUB_OUTPUT"
          fi
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release -p ContinuousIntegrationBuild=true
      - run: dotnet pack --no-build -c Release -o ../pack -p PackageVersion=${{steps.version.outputs.version}}
      - uses: actions/upload-artifact@v6
        with:
          name: packages
          path: pack/*nupkg
      - if: env.PUBLISH == 'true'
        run: dotnet nuget push *.nupkg -s nuget.org -k ${{secrets.NUGET_API_KEY}} --skip-duplicate
        working-directory: pack
